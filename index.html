<!DOCTYPE html>
<html>
<head>
    <title>Resume Analyzer</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
        }
        .box {
            margin-top: 100px;
        }
        input, button {
            padding: 10px;
            margin: 10px;
            border-radius: 10px;
            border: none;
        }
        button {
            background: #ff7eb3;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #ff4f81;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>📄 Resume Analyzer</h1>
        <form action="/predict" method="post" enctype="multipart/form-data">
            <input type="file" name="resume">
            <br>
            <button type="submit">Analyze Resume 🚀</button>
        </form>

        <br>
        <a href="/dashboard" style="color:white;">📊 View Dashboard</a>
    </div>
</body>
</html>
